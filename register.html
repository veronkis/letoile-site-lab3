<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Лэтуаль | Регистрация</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo">
                <h1>ЛЭТУАЛЬ</h1>
                <p>Beauty is your way</p>
            </div>
        </header>
        
        <nav class="nav">
            <div class="nav-links">
                <a href="index.html">Главная</a>
                <a href="catalog.html">Каталог</a>
                <a href="contacts.html">Контакты</a>
            </div>
        </nav>
        
        <main class="main-content" style="padding: 40px;">
            <h1 style="color: var(--primary); text-align: center;">Регистрация</h1>
            <hr>
            <div class="contact-form" style="max-width: 400px; margin: 0 auto;">
                <form>
                    <div class="form-group">
                        <label>Имя</label>
                        <input type="text" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" required>
                    </div>
                    <div class="form-group">
                        <label>Пароль</label>
                        <input type="password" required>
                    </div>
                    <button type="submit" class="btn" style="width: 100%;">Зарегистрироваться</button>
                </form>
                <p style="text-align: center; margin-top: 20px;">Уже есть аккаунт? <a href="index.html">Войти</a></p>
            </div>
        </main>
        
        <footer class="footer">
            <hr>
            <p>&copy; 2024 Лэтуаль. Все права защищены</p>
        </footer>
    </div>
</body>
</html>
